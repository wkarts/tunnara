name: Desktop artifacts

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release draft que receberá os instaladores desktop'
        required: true
        type: string
      release_ref:
        description: 'Git ref imutável usado no checkout'
        required: false
        default: ''
        type: string
      release_id:
        description: 'ID numérico da release draft coordenada'
        required: true
        type: string
      prerelease:
        description: 'Indica canal de pré-release'
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release existente que receberá os instaladores desktop'
        required: true
        type: string
      release_ref:
        description: 'Git ref imutável usado no checkout'
        required: false
        default: ''
        type: string
      release_id:
        description: 'ID numérico da release existente'
        required: true
        type: string
      prerelease:
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build:
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            suffix: linux-x64
          - platform: windows-latest
            suffix: windows-x64
          - platform: macos-15
            suffix: macos-arm64
          - platform: macos-15-intel
            suffix: macos-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_ref || inputs.release_tag }}

      - name: Verify coordinated draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ inputs.release_id }}
          TAG: ${{ inputs.release_tag }}
        run: |
          set -Eeuo pipefail
          actual_tag="$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq .tag_name)"
          is_draft="$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq .draft)"
          [[ "$actual_tag" == "$TAG" && "$is_draft" == true ]] || {
            echo "Release coordenada inválida: id=$RELEASE_ID tag=$actual_tag draft=$is_draft" >&2
            exit 1
          }

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/console/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/console/src-tauri -> target
          shared-key: desktop-${{ matrix.suffix }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install console dependencies
        shell: bash
        run: bash scripts/ci/npm-ci.sh apps/console

      - name: Configure optional updater and Apple signing
        shell: bash
        env:
          IN_TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          IN_TAURI_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          IN_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          IN_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IN_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          IN_APPLE_ID: ${{ secrets.APPLE_ID }}
          IN_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          IN_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -Eeuo pipefail
          append_multiline() {
            local key="$1" value="$2" marker="TUNNARA_$(openssl rand -hex 12)"
            { echo "$key<<$marker"; printf '%s\n' "$value"; echo "$marker"; } >> "$GITHUB_ENV"
          }
          if [[ -n "$IN_TAURI_KEY" && -n "$IN_TAURI_PASSWORD" ]]; then
            append_multiline TAURI_SIGNING_PRIVATE_KEY "$IN_TAURI_KEY"
            append_multiline TAURI_SIGNING_PRIVATE_KEY_PASSWORD "$IN_TAURI_PASSWORD"
          else
            echo '::notice::Assinatura do updater Tauri não configurada; bundles serão gerados sem assinatura de updater.'
          fi
          if [[ "$RUNNER_OS" == macOS && -n "$IN_APPLE_CERTIFICATE" && -n "$IN_APPLE_CERTIFICATE_PASSWORD" && -n "$IN_APPLE_SIGNING_IDENTITY" && -n "$IN_APPLE_ID" && -n "$IN_APPLE_PASSWORD" && -n "$IN_APPLE_TEAM_ID" ]]; then
            append_multiline APPLE_CERTIFICATE "$IN_APPLE_CERTIFICATE"
            append_multiline APPLE_CERTIFICATE_PASSWORD "$IN_APPLE_CERTIFICATE_PASSWORD"
            append_multiline APPLE_SIGNING_IDENTITY "$IN_APPLE_SIGNING_IDENTITY"
            append_multiline APPLE_ID "$IN_APPLE_ID"
            append_multiline APPLE_PASSWORD "$IN_APPLE_PASSWORD"
            append_multiline APPLE_TEAM_ID "$IN_APPLE_TEAM_ID"
          elif [[ "$RUNNER_OS" == macOS ]]; then
            echo '::notice::Credenciais Apple incompletas; build macOS seguirá sem notarização/assinatura comercial.'
          fi

      - name: Build and upload Tauri bundles to coordinated release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/console
          releaseId: ${{ inputs.release_id }}
          tagName: ${{ inputs.release_tag }}
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          retryAttempts: 3
          uploadWorkflowArtifacts: false
          releaseAssetNamePattern: Tunnara-Console-[version]-[platform]-[arch]-[bundle][setup].[ext]
