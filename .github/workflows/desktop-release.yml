name: Desktop artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release que receberá os instaladores desktop'
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: desktop-${{ github.ref }}-${{ inputs.release_tag || 'tag' }}
  cancel-in-progress: false

jobs:
  build:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-24.04
          - windows-latest
          - macos-14
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Dependências Linux do Tauri
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install console dependencies
        shell: bash
        run: bash scripts/ci/npm-ci.sh apps/console
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/console
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          releaseName: Tunnara v__VERSION__
          releaseDraft: false
          prerelease: false
