name: Desktop artifacts

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release draft que receberá os instaladores desktop'
        required: true
        type: string
      source_sha:
        description: 'Commit imutável a ser compilado'
        required: true
        type: string
      release_id:
        description: 'ID numérico da GitHub Release draft existente'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release existente que receberá os instaladores desktop'
        required: true
        type: string
      source_sha:
        description: 'Commit a ser compilado; vazio usa o commit do workflow'
        required: false
        default: ''
        type: string
      release_id:
        description: 'ID numérico da GitHub Release existente'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build:
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            suffix: linux-x64
          - platform: windows-latest
            suffix: windows-x64
          - platform: macos-15
            suffix: macos-arm64
          - platform: macos-15-intel
            suffix: macos-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Ensure target release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
          RELEASE_ID: ${{ inputs.release_id }}
        run: bash scripts/release/resolve-release-id.sh "$TAG" "$RELEASE_ID" >/dev/null

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/console/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/console/src-tauri -> target
          shared-key: desktop-${{ matrix.suffix }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install console dependencies
        shell: bash
        run: bash scripts/ci/npm-ci.sh apps/console

      - name: Prepare optional desktop signing environment
        shell: bash
        env:
          INPUT_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          INPUT_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          INPUT_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          INPUT_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          INPUT_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          INPUT_APPLE_ID: ${{ secrets.APPLE_ID }}
          INPUT_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          INPUT_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -Eeuo pipefail
          if [[ -n "$INPUT_TAURI_SIGNING_PRIVATE_KEY" && -n "$INPUT_TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]]; then
            {
              echo 'TAURI_SIGNING_PRIVATE_KEY<<TUNNARA_EOF'
              echo "$INPUT_TAURI_SIGNING_PRIVATE_KEY"
              echo 'TUNNARA_EOF'
              echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$INPUT_TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          fi
          if [[ "$RUNNER_OS" == 'macOS' && -n "$INPUT_APPLE_CERTIFICATE" && -n "$INPUT_APPLE_CERTIFICATE_PASSWORD" && -n "$INPUT_APPLE_SIGNING_IDENTITY" && -n "$INPUT_APPLE_ID" && -n "$INPUT_APPLE_PASSWORD" && -n "$INPUT_APPLE_TEAM_ID" ]]; then
            {
              echo 'APPLE_CERTIFICATE<<TUNNARA_EOF'
              echo "$INPUT_APPLE_CERTIFICATE"
              echo 'TUNNARA_EOF'
              echo "APPLE_CERTIFICATE_PASSWORD=$INPUT_APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$INPUT_APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$INPUT_APPLE_ID"
              echo "APPLE_PASSWORD=$INPUT_APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$INPUT_APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo '::notice::Assinatura/notarização desktop não configurada; build sem credenciais comerciais.'
          fi

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/console
          releaseId: ${{ inputs.release_id }}
          tagName: ${{ inputs.release_tag }}
          releaseDraft: true
          prerelease: ${{ contains(inputs.release_tag, '-') }}
          retryAttempts: 3
          uploadWorkflowArtifacts: false
          releaseAssetNamePattern: Tunnara-Desktop-v[version]-[platform]-[arch]-[bundle][ext]
