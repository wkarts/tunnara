name: Desktop artifacts

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release draft que receberá os instaladores desktop'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release existente que receberá os instaladores desktop'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build:
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            suffix: linux-x64
          - platform: windows-latest
            suffix: windows-x64
          - platform: macos-15
            suffix: macos-arm64
          - platform: macos-15-intel
            suffix: macos-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Ensure target release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
        run: gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/console/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/console/src-tauri -> target
          shared-key: desktop-${{ matrix.suffix }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install console dependencies
        shell: bash
        run: bash scripts/ci/npm-ci.sh apps/console

      - name: Configure optional updater signing
        id: updater-signing
        shell: bash
        env:
          TUNNARA_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TUNNARA_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -Eeuo pipefail
          ready=false
          append_env() {
            local name="$1"
            local value="$2"
            local delimiter="TUNNARA_${name}_$RANDOM$RANDOM"
            {
              printf '%s<<%s\n' "$name" "$delimiter"
              printf '%s\n' "$value"
              printf '%s\n' "$delimiter"
            } >> "$GITHUB_ENV"
          }
          if [[ -n "$TUNNARA_TAURI_SIGNING_PRIVATE_KEY" ]]; then
            append_env TAURI_SIGNING_PRIVATE_KEY "$TUNNARA_TAURI_SIGNING_PRIVATE_KEY"
            if [[ -n "$TUNNARA_TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]]; then
              append_env TAURI_SIGNING_PRIVATE_KEY_PASSWORD "$TUNNARA_TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            fi
            ready=true
          else
            echo "::notice::Chave do updater Tauri ausente; instaladores serão gerados sem updater assinado."
          fi
          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Configure optional macOS signing and notarization
        id: apple-signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          TUNNARA_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          TUNNARA_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TUNNARA_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TUNNARA_APPLE_ID: ${{ secrets.APPLE_ID }}
          TUNNARA_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TUNNARA_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -Eeuo pipefail
          ready=false
          append_env() {
            local name="$1"
            local value="$2"
            local delimiter="TUNNARA_${name}_$RANDOM$RANDOM"
            {
              printf '%s<<%s\n' "$name" "$delimiter"
              printf '%s\n' "$value"
              printf '%s\n' "$delimiter"
            } >> "$GITHUB_ENV"
          }
          signing_ready=false
          notarization_ready=false
          if [[ -n "$TUNNARA_APPLE_CERTIFICATE" && -n "$TUNNARA_APPLE_CERTIFICATE_PASSWORD" && -n "$TUNNARA_APPLE_SIGNING_IDENTITY" ]]; then
            append_env APPLE_CERTIFICATE "$TUNNARA_APPLE_CERTIFICATE"
            append_env APPLE_CERTIFICATE_PASSWORD "$TUNNARA_APPLE_CERTIFICATE_PASSWORD"
            append_env APPLE_SIGNING_IDENTITY "$TUNNARA_APPLE_SIGNING_IDENTITY"
            signing_ready=true

            if [[ -n "$TUNNARA_APPLE_ID" && -n "$TUNNARA_APPLE_PASSWORD" && -n "$TUNNARA_APPLE_TEAM_ID" ]]; then
              append_env APPLE_ID "$TUNNARA_APPLE_ID"
              append_env APPLE_PASSWORD "$TUNNARA_APPLE_PASSWORD"
              append_env APPLE_TEAM_ID "$TUNNARA_APPLE_TEAM_ID"
              notarization_ready=true
            else
              echo "::notice::Credenciais de notarização ausentes; o bundle macOS será assinado sem notarização."
            fi
          else
            echo "::notice::Certificado Apple ausente ou incompleto; bundle macOS será gerado sem importação de certificado."
          fi
          ready="$signing_ready"
          echo "notarization_ready=$notarization_ready" >> "$GITHUB_OUTPUT"
          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/console
          tagName: ${{ inputs.release_tag }}
          releaseName: Tunnara Platform __VERSION__
          releaseDraft: true
          prerelease: false
          retryAttempts: 3
          uploadUpdaterJson: ${{ steps.updater-signing.outputs.ready == 'true' }}
          uploadUpdaterSignatures: ${{ steps.updater-signing.outputs.ready == 'true' }}
