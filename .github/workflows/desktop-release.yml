name: Desktop artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-24.04
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Dependências Linux do Tauri
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: npm ci
        working-directory: apps/console
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/console
          tagName: v__VERSION__
          releaseName: Tunnara v__VERSION__
          releaseDraft: false
          prerelease: false
