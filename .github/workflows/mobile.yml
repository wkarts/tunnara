name: Mobile build validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'sdk/mobile/**'
      - '.github/workflows/mobile.yml'
      - '.github/workflows/mobile-release.yml'
      - 'scripts/version/**'
      - 'VERSION'
  push:
    branches: [main, next]
    paths:
      - 'sdk/mobile/**'
      - '.github/workflows/mobile.yml'
      - '.github/workflows/mobile-release.yml'
      - 'scripts/version/**'
      - 'VERSION'

permissions:
  contents: read

jobs:
  android:
    name: Android APK/AAB without store credentials
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Build installable debug APK and unsigned release artifacts
        run: sdk/mobile/android/scripts/build-artifacts.sh
      - uses: actions/upload-artifact@v4
        with:
          name: tunnara-android-${{ github.sha }}
          path: sdk/mobile/android/dist/*
          if-no-files-found: error
          retention-days: 14

  ios:
    name: iOS simulator app and unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build without Apple signing credentials
        run: sdk/mobile/ios/scripts/build-artifacts.sh
      - uses: actions/upload-artifact@v4
        with:
          name: tunnara-ios-${{ github.sha }}
          path: |
            sdk/mobile/ios/dist/*.ipa
            sdk/mobile/ios/dist/*.zip
            sdk/mobile/ios/dist/*.json
            sdk/mobile/ios/dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
