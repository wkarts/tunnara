name: Mobile release assets and optional stores

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release draft que receberá APK/AAB/IPA'
        required: true
        type: string
      source_sha:
        description: 'Commit imutável a ser compilado'
        required: true
        type: string
      release_id:
        description: 'ID numérico da GitHub Release draft coordenada'
        required: true
        type: string
      publish_google_play:
        required: false
        default: false
        type: boolean
      publish_testflight:
        required: false
        default: false
        type: boolean
      ios_export_method:
        required: false
        default: development
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release existente que receberá APK/AAB/IPA'
        required: true
        type: string
      source_sha:
        description: 'Commit a ser compilado; vazio usa o commit do workflow'
        required: false
        default: ''
        type: string
      release_id:
        description: 'ID numérico da GitHub Release existente; vazio resolve por tag incluindo drafts'
        required: false
        default: ''
        type: string
      publish_google_play:
        description: 'Publicar o AAB assinado no Google Play'
        required: false
        default: false
        type: boolean
      publish_testflight:
        description: 'Publicar o IPA assinado no TestFlight'
        required: false
        default: false
        type: boolean
      ios_export_method:
        description: 'Método de exportação iOS'
        required: false
        default: development
        type: choice
        options: [development, ad-hoc, app-store, app-store-connect]

permissions:
  contents: write

concurrency:
  group: mobile-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare GitHub Release storage
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      release_id: ${{ steps.release.outputs.value }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha || github.sha }}
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          tag="${{ inputs.release_tag }}"
          [[ -n "$tag" ]] || { echo "release_tag é obrigatório." >&2; exit 1; }
          echo "value=$tag" >> "$GITHUB_OUTPUT"
      - name: Resolve coordinated draft release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.value }}
          RELEASE_ID: ${{ inputs.release_id }}
        shell: bash
        run: |
          release_id="$(bash scripts/release/resolve-release-id.sh "$TAG" "$RELEASE_ID")"
          echo "value=$release_id" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android APK/AAB
    needs: prepare-release
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.TUNNARA_ANDROID_KEYSTORE_BASE64 }}
      TUNNARA_ANDROID_STORE_PASSWORD: ${{ secrets.TUNNARA_ANDROID_STORE_PASSWORD }}
      TUNNARA_ANDROID_KEY_ALIAS: ${{ secrets.TUNNARA_ANDROID_KEY_ALIAS }}
      TUNNARA_ANDROID_KEY_PASSWORD: ${{ secrets.TUNNARA_ANDROID_KEY_PASSWORD }}
      WANT_PUBLISH: ${{ inputs.publish_google_play || vars.TUNNARA_ENABLE_GOOGLE_PLAY_PUBLISH == 'true' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha || github.sha }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'
      - name: Prepare optional Android signing
        shell: bash
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$TUNNARA_ANDROID_STORE_PASSWORD" && -n "$TUNNARA_ANDROID_KEY_ALIAS" && -n "$TUNNARA_ANDROID_KEY_PASSWORD" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tunnara-release.jks"
            echo "TUNNARA_ANDROID_KEYSTORE=$RUNNER_TEMP/tunnara-release.jks" >> "$GITHUB_ENV"
          else
            echo "::notice::Keystore ausente ou incompleto; APK/AAB unsigned serão gerados sem falhar."
          fi
      - name: Build APK and AAB
        run: bash sdk/mobile/android/scripts/build-artifacts.sh
      - name: Attach Android files directly to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
        run: bash scripts/release/upload-release-assets.sh "$TAG" sdk/mobile/android/dist "$RELEASE_ID"
      - name: Locate signed AAB
        id: signed-aab
        shell: bash
        run: |
          aab="$(find sdk/mobile/android/dist -type f -name '*release-signed.aab' -print -quit)"
          ready=false
          if [[ "$WANT_PUBLISH" == true && -n "${{ secrets.TUNNARA_GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" && -n "$aab" ]]; then ready=true; fi
          echo "path=$aab" >> "$GITHUB_OUTPUT"
          echo "ready=$ready" >> "$GITHUB_OUTPUT"
      - name: Publish optionally to Google Play
        if: steps.signed-aab.outputs.ready == 'true'
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.TUNNARA_GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: br.com.wwsoftwares.tunnara.mobile
          releaseFiles: ${{ steps.signed-aab.outputs.path }}
          tracks: ${{ vars.TUNNARA_GOOGLE_PLAY_TRACK || 'internal' }}
          status: completed

  build-ios:
    name: Build iOS IPA
    needs: prepare-release
    runs-on: macos-15
    timeout-minutes: 75
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.TUNNARA_APPLE_CERTIFICATE_BASE64 }}
      APPLE_APP_PROFILE_BASE64: ${{ secrets.TUNNARA_APPLE_APP_PROFILE_BASE64 }}
      APPLE_PACKET_PROFILE_BASE64: ${{ secrets.TUNNARA_APPLE_PACKET_TUNNEL_PROFILE_BASE64 }}
      TUNNARA_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.TUNNARA_APPLE_CERTIFICATE_PASSWORD }}
      TUNNARA_APPLE_TEAM_ID: ${{ secrets.TUNNARA_APPLE_TEAM_ID }}
      TUNNARA_IOS_EXPORT_METHOD: ${{ inputs.ios_export_method || 'development' }}
      WANT_PUBLISH: ${{ inputs.publish_testflight || vars.TUNNARA_ENABLE_APPSTORE_PUBLISH == 'true' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha || github.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache: false
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Prepare optional Apple signing
        shell: bash
        run: |
          if [[ -n "$APPLE_CERTIFICATE_BASE64" && -n "$APPLE_APP_PROFILE_BASE64" && -n "$APPLE_PACKET_PROFILE_BASE64" && -n "$TUNNARA_APPLE_CERTIFICATE_PASSWORD" && -n "$TUNNARA_APPLE_TEAM_ID" ]]; then
            printf '%s' "$APPLE_CERTIFICATE_BASE64" | openssl base64 -d -A > "$RUNNER_TEMP/tunnara-distribution.p12"
            printf '%s' "$APPLE_APP_PROFILE_BASE64" | openssl base64 -d -A > "$RUNNER_TEMP/tunnara-app.mobileprovision"
            printf '%s' "$APPLE_PACKET_PROFILE_BASE64" | openssl base64 -d -A > "$RUNNER_TEMP/tunnara-packet.mobileprovision"
            {
              echo "TUNNARA_APPLE_CERTIFICATE_P12=$RUNNER_TEMP/tunnara-distribution.p12"
              echo "TUNNARA_APPLE_APP_PROFILE=$RUNNER_TEMP/tunnara-app.mobileprovision"
              echo "TUNNARA_APPLE_PACKET_TUNNEL_PROFILE=$RUNNER_TEMP/tunnara-packet.mobileprovision"
            } >> "$GITHUB_ENV"
          else
            echo "::notice::Credenciais Apple ausentes ou incompletas; IPA unsigned será gerado sem falhar."
          fi
      - name: Build simulator app and IPA files
        run: bash sdk/mobile/ios/scripts/build-artifacts.sh
      - name: Attach iOS files directly to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
        run: bash scripts/release/upload-release-assets.sh "$TAG" sdk/mobile/ios/dist "$RELEASE_ID"
      - name: Locate signed IPA
        id: signed-ipa
        shell: bash
        run: |
          ipa="$(find sdk/mobile/ios/dist -type f -name '*signed.ipa' -print -quit)"
          ready=false
          if [[ "$WANT_PUBLISH" == true && -n "${{ secrets.TUNNARA_APPSTORE_ISSUER_ID }}" && -n "${{ secrets.TUNNARA_APPSTORE_API_KEY_ID }}" && -n "${{ secrets.TUNNARA_APPSTORE_API_PRIVATE_KEY }}" && -n "$ipa" ]]; then ready=true; fi
          echo "path=$ipa" >> "$GITHUB_OUTPUT"
          echo "ready=$ready" >> "$GITHUB_OUTPUT"
      - name: Publish optionally to TestFlight
        if: steps.signed-ipa.outputs.ready == 'true'
        continue-on-error: true
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.signed-ipa.outputs.path }}
          issuer-id: ${{ secrets.TUNNARA_APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.TUNNARA_APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.TUNNARA_APPSTORE_API_PRIVATE_KEY }}
