name: CI fast

on:
  pull_request:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  NPM_CONFIG_AUDIT: 'false'
  NPM_CONFIG_FUND: 'false'

jobs:
  core:
    name: Core and runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root dependencies
        run: bash scripts/ci/npm-ci.sh .
      - name: Repository integrity
        run: npm run repository:check
      - name: Version synchronization
        run: |
          npm run version:check
          npm run version:test
      - name: Static syntax checks
        run: |
          npm run validate:node
          npm run validate:shell
          npm run validate:php
          npm run validate:storage
          npm run validate:release
          npm run validate:sea
          npm run validate:docker
      - name: Runtime end-to-end tests
        run: npm run runtime:test

  console:
    name: Console Vue
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - name: Install console dependencies
        run: bash scripts/ci/npm-ci.sh apps/console
      - name: Typecheck and production build
        working-directory: apps/console
        run: |
          npm run ci:version
          npm run typecheck
          npm run build:web

  docker-config:
    name: Docker configuration
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Generate safe local environment
        run: bash deploy/docker/tunnara.sh init
      - name: Validate Docker Compose models
        run: |
          docker compose --env-file deploy/docker/.env -f deploy/docker/docker-compose.yml config --quiet
          docker compose --env-file deploy/docker/.env -f deploy/docker/docker-compose.distributed.yml config --quiet
          docker compose --env-file deploy/docker/.env -f deploy/docker/docker-compose.yml -f deploy/docker/docker-compose.observability.yml config --quiet


  control-api:
    name: Distributed Control API
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/control-api
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_sqlite, openssl, sodium
          coverage: none
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Validate and test distributed control plane
        run: |
          composer validate --strict --no-check-publish
          php artisan test
