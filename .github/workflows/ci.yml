name: CI

on:
  pull_request:
  push:
    branches: [main, next]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Repository integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run repository:check
      - run: npm run version:check
      - run: npm run validate:node
      - run: npm run validate:shell
      - run: npm run validate:php

  runtime:
    name: Runtime HTTP tunnel E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run runtime:test
      - run: node scripts/release/build-sea.mjs agent dist/tunnara-agent-linux-x64
      - run: node scripts/release/build-sea.mjs server dist/tunnara-server-linux-x64
      - name: E2E com executáveis standalone
        env:
          TUNNARA_E2E_AGENT_BIN: dist/tunnara-agent-linux-x64
          TUNNARA_E2E_SERVER_BIN: dist/tunnara-server-linux-x64
        run: npm run runtime:test

  console:
    name: Console Vue
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - run: npm ci
        working-directory: apps/console
      - run: npm run ci:version
        working-directory: apps/console
      - run: npm run typecheck
        working-directory: apps/console
      - run: npm run build:web
        working-directory: apps/console
