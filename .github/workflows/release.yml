name: Release after merge

on:
  push:
    branches: [main]
    paths:
      - VERSION
      - .github/workflows/release.yml
      - .github/workflows/runtime-release.yml
      - .github/workflows/sdk-build.yml
      - .github/workflows/desktop-release.yml
      - .github/workflows/mobile-release.yml
      - scripts/release/**
      - sdk/mobile/ios/scripts/**
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Regerar e substituir todos os assets da versão atual'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  NPM_CONFIG_AUDIT: 'false'
  NPM_CONFIG_FUND: 'false'

jobs:
  prepare:
    name: Prepare draft release
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      should_build: ${{ steps.release.outputs.should_build }}
      rebuild_requested: ${{ steps.release.outputs.rebuild_requested }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve deterministic release version
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          AUTO_REBUILD: ${{ github.event_name == 'push' }}
          FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild || false }}
        run: |
          set -Eeuo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || {
            echo "VERSION inválida: $version" >&2
            exit 1
          }

          should_build=true
          notes_file="docs/releases/v${version}.md"
          rebuild_requested=false
          if [[ "$AUTO_REBUILD" == 'true' || "$FORCE_REBUILD" == 'true' ]]; then
            rebuild_requested=true
          fi

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            is_draft="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" == 'true' || "$rebuild_requested" == 'true' ]]; then
              if [[ "$is_draft" == 'true' ]]; then
                echo "::notice::A release $tag está em draft; os builds serão retomados e os assets substituídos."
              else
                echo "::notice::A release publicada $tag será reaberta em draft para reconstruir os assets do commit $GITHUB_SHA."
              fi

              current_ref_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$tag" --jq '.object.sha' 2>/dev/null || true)"
              if [[ -n "$current_ref_sha" && "$current_ref_sha" != "$GITHUB_SHA" ]]; then
                echo "::notice::Atualizando a tag $tag de $current_ref_sha para $GITHUB_SHA."
                gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/$tag" \
                  -f sha="$GITHUB_SHA" \
                  -F force=true >/dev/null
              fi

              edit_args=(--repo "$GITHUB_REPOSITORY" --title "Tunnara Platform $version" --draft=true --latest=false)
              if [[ -f "$notes_file" ]]; then edit_args+=(--notes-file "$notes_file"); fi
              gh release edit "$tag" "${edit_args[@]}"
            else
              should_build=false
              echo "::notice::A release publicada $tag já existe e esta execução não solicitou reconstrução."
            fi
          else
            create_args=(--repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "Tunnara Platform $version" --draft)
            if [[ -f "$notes_file" ]]; then
              create_args+=(--notes-file "$notes_file")
            else
              create_args+=(--generate-notes)
            fi
            gh release create "$tag" "${create_args[@]}"
          fi

          if [[ "$should_build" == 'true' ]]; then
            release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --jq '.id')"
            for legacy_name in SHA256SUMS.txt build-metadata.json; do
              while IFS= read -r asset_id; do
                [[ -n "$asset_id" ]] || continue
                echo "::notice::Removendo asset legado conflitante $legacy_name (id=$asset_id)."
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" >/dev/null
              done < <(
                gh api --paginate "repos/$GITHUB_REPOSITORY/releases/$release_id/assets" \
                  --jq ".[] | select(.name == \"$legacy_name\") | .id"
              )
            done
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "should_build=$should_build"
            echo "rebuild_requested=$rebuild_requested"
          } >> "$GITHUB_OUTPUT"

      - name: Release summary
        shell: bash
        run: |
          {
            echo '## Release Tunnara'
            echo
            echo '- Versão: `${{ steps.release.outputs.version }}`'
            echo '- Tag: `${{ steps.release.outputs.tag }}`'
            echo '- Build necessário: `${{ steps.release.outputs.should_build }}`'
            echo '- Reconstrução solicitada: `${{ steps.release.outputs.rebuild_requested }}`'
            echo '- Evento: `${{ github.event_name }}`'
            echo '- A release permanece em draft até todos os builds obrigatórios terminarem.'
          } >> "$GITHUB_STEP_SUMMARY"

  core:
    name: Build and upload core assets
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/console/package-lock.json

      - name: Install root and console dependencies
        run: |
          bash scripts/ci/npm-ci.sh .
          bash scripts/ci/npm-ci.sh apps/console

      - name: Validate repository
        run: |
          npm run repository:check
          npm run version:check
          npm run validate:node
          npm run validate:shell
          npm run validate:php
          npm run validate:storage
          npm run validate:mobile
          npm run validate:release
          npm run validate:docker
          npm run runtime:test

      - name: Build core deliverables
        shell: bash
        run: |
          npm run console:build
          npm run sdk:c:build
          node scripts/release/build-sea.mjs agent dist/tunnara-agent-linux-x64
          node scripts/release/build-sea.mjs server dist/tunnara-server-linux-x64
          TUNNARA_E2E_AGENT_BIN=dist/tunnara-agent-linux-x64 \
          TUNNARA_E2E_SERVER_BIN=dist/tunnara-server-linux-x64 \
            npm run runtime:test
          npm run artifacts:package

      - name: Upload core assets to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: bash scripts/release/upload-release-assets.sh "$TAG" artifacts

  runtime:
    name: Runtime executables
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/runtime-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  sdk:
    name: SDK binaries
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/sdk-build.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  desktop:
    name: Desktop applications
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/desktop-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  mobile:
    name: Mobile applications
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/mobile-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      publish_google_play: false
      publish_testflight: false
      ios_export_method: development
    secrets: inherit

  containers:
    name: Container images
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/docker-publish.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  finalize:
    name: Publish completed release
    needs: [prepare, core, runtime, sdk, desktop, mobile, containers]
    if: always() && needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Verify required build results
        shell: bash
        env:
          CORE_RESULT: ${{ needs.core.result }}
          RUNTIME_RESULT: ${{ needs.runtime.result }}
          SDK_RESULT: ${{ needs.sdk.result }}
          DESKTOP_RESULT: ${{ needs.desktop.result }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
          CONTAINERS_RESULT: ${{ needs.containers.result }}
        run: |
          set -Eeuo pipefail
          failed=0
          for item in \
            "core:$CORE_RESULT" \
            "runtime:$RUNTIME_RESULT" \
            "sdk:$SDK_RESULT" \
            "desktop:$DESKTOP_RESULT" \
            "mobile:$MOBILE_RESULT" \
            "containers:$CONTAINERS_RESULT"; do
            name="${item%%:*}"
            result="${item#*:}"
            echo "$name=$result"
            [[ "$result" == success ]] || failed=1
          done
          if [[ "$failed" -ne 0 ]]; then
            echo 'Um ou mais builds obrigatórios falharam. A release permanecerá em draft.' >&2
            exit 1
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest

      - name: Final summary
        shell: bash
        run: |
          {
            echo '## Release publicada'
            echo
            echo '- Tag: `${{ needs.prepare.outputs.tag }}`'
            echo '- Core, runtimes, SDKs, desktop, mobile e containers concluídos.'
            echo '- Os binários foram anexados diretamente à GitHub Release.'
            echo '- As imagens foram publicadas no GHCR.'
          } >> "$GITHUB_STEP_SUMMARY"
