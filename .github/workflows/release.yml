name: Release after merge

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Versão SemVer já sincronizada na branch main'
        required: true
        type: string
      force_rebuild:
        description: 'Regerar e substituir assets de uma release que ainda esteja em draft'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ inputs.release_version }}
  cancel-in-progress: false

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  NPM_CONFIG_AUDIT: 'false'
  NPM_CONFIG_FUND: 'false'

jobs:
  prepare:
    name: Prepare draft release
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_id: ${{ steps.release.outputs.release_id }}
      should_build: ${{ steps.release.outputs.should_build }}
      rebuild_requested: ${{ steps.release.outputs.rebuild_requested }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve immutable release version
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_VERSION: ${{ inputs.release_version }}
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: |
          set -Eeuo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          requested_version="$(printf '%s' "$REQUESTED_VERSION" | tr -d '[:space:]')"

          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "VERSION inválida: $version" >&2
            exit 1
          }
          [[ "$requested_version" == "$version" ]] || {
            echo "A versão solicitada ($requested_version) difere da VERSION da main ($version)." >&2
            exit 1
          }

          tag="v${version}"
          notes_file="docs/releases/v${version}.md"
          rebuild_requested="${FORCE_REBUILD:-false}"
          should_build=true

          mapfile -t matching_releases < <(
            gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"$tag\") | [.id, .draft, .html_url] | @tsv"
          )

          if (( ${#matching_releases[@]} > 1 )); then
            echo "Existem múltiplas releases associadas a $tag. Remova os drafts duplicados antes de prosseguir." >&2
            printf 'release conflitante: %s\n' "${matching_releases[@]}" >&2
            exit 1
          fi

          if (( ${#matching_releases[@]} == 1 )); then
            IFS=$'\t' read -r release_id is_draft release_url <<< "${matching_releases[0]}"
            if [[ "$is_draft" != 'true' ]]; then
              echo "A release $tag já está publicada e é imutável. Incremente VERSION antes de criar outra release." >&2
              exit 1
            fi

            echo "::notice::Retomando a release draft $tag (id=$release_id)."
            api_args=(
              --method PATCH
              "repos/$GITHUB_REPOSITORY/releases/$release_id"
              -f tag_name="$tag"
              -f target_commitish="$GITHUB_SHA"
              -f name="Tunnara Platform $version"
              -F draft=true
              -F prerelease=false
            )
            if [[ -f "$notes_file" ]]; then
              api_args+=(-f body="$(cat "$notes_file")")
            fi
            gh api "${api_args[@]}" >/dev/null
          else
            create_args=(
              --method POST
              "repos/$GITHUB_REPOSITORY/releases"
              -f tag_name="$tag"
              -f target_commitish="$GITHUB_SHA"
              -f name="Tunnara Platform $version"
              -F draft=true
              -F prerelease=false
            )
            if [[ -f "$notes_file" ]]; then
              create_args+=(-f body="$(cat "$notes_file")")
            else
              create_args+=(-F generate_release_notes=true)
            fi
            release_id="$(gh api "${create_args[@]}" --jq '.id')"
            echo "::notice::Release draft $tag criada com id=$release_id."
          fi

          for legacy_name in SHA256SUMS.txt build-metadata.json; do
            while IFS= read -r asset_id; do
              [[ -n "$asset_id" ]] || continue
              echo "::notice::Removendo asset legado conflitante $legacy_name (id=$asset_id)."
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" >/dev/null
            done < <(
              gh api --paginate "repos/$GITHUB_REPOSITORY/releases/$release_id/assets?per_page=100" \
                --jq ".[] | select(.name == \"$legacy_name\") | .id"
            )
          done

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "release_id=$release_id"
            echo "should_build=$should_build"
            echo "rebuild_requested=$rebuild_requested"
          } >> "$GITHUB_OUTPUT"

      - name: Release summary
        shell: bash
        run: |
          {
            echo '## Release Tunnara'
            echo
            echo '- Versão: `${{ steps.release.outputs.version }}`'
            echo '- Tag: `${{ steps.release.outputs.tag }}`'
            echo '- Release ID: `${{ steps.release.outputs.release_id }}`'
            echo '- Build necessário: `${{ steps.release.outputs.should_build }}`'
            echo '- Reconstrução de draft solicitada: `${{ steps.release.outputs.rebuild_requested }}`'
            echo '- Releases já publicadas nunca são reabertas, sobrescritas ou reposicionadas.'
            echo '- A release atual permanece em draft até todos os builds obrigatórios terminarem.'
          } >> "$GITHUB_STEP_SUMMARY"

  core:
    name: Build and upload core assets
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/console/package-lock.json

      - name: Install root and console dependencies
        run: |
          bash scripts/ci/npm-ci.sh .
          bash scripts/ci/npm-ci.sh apps/console

      - name: Validate repository
        run: |
          npm run repository:check
          npm run version:check
          npm run validate:node
          npm run validate:shell
          npm run validate:php
          npm run validate:storage
          npm run validate:mobile
          npm run validate:release
          npm run validate:docker
          npm run runtime:test

      - name: Build core deliverables
        shell: bash
        run: |
          npm run console:build
          npm run sdk:c:build
          node scripts/release/build-sea.mjs agent dist/tunnara-agent-linux-x64
          node scripts/release/build-sea.mjs server dist/tunnara-server-linux-x64
          TUNNARA_E2E_AGENT_BIN=dist/tunnara-agent-linux-x64 \
          TUNNARA_E2E_SERVER_BIN=dist/tunnara-server-linux-x64 \
            npm run runtime:test
          npm run artifacts:package

      - name: Upload core assets to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: bash scripts/release/upload-release-assets.sh "$TAG" artifacts

  runtime:
    name: Runtime executables
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/runtime-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  sdk:
    name: SDK binaries
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/sdk-build.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  desktop:
    name: Desktop applications
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/desktop-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      release_id: ${{ needs.prepare.outputs.release_id }}
    secrets: inherit

  mobile:
    name: Mobile applications
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/mobile-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      publish_google_play: false
      publish_testflight: false
      ios_export_method: development
    secrets: inherit

  containers:
    name: Container images
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/docker-publish.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  finalize:
    name: Publish completed release
    needs: [prepare, core, runtime, sdk, desktop, mobile, containers]
    if: always() && needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Verify required build results
        shell: bash
        env:
          CORE_RESULT: ${{ needs.core.result }}
          RUNTIME_RESULT: ${{ needs.runtime.result }}
          SDK_RESULT: ${{ needs.sdk.result }}
          DESKTOP_RESULT: ${{ needs.desktop.result }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
          CONTAINERS_RESULT: ${{ needs.containers.result }}
        run: |
          set -Eeuo pipefail
          failed=0
          for item in \
            "core:$CORE_RESULT" \
            "runtime:$RUNTIME_RESULT" \
            "sdk:$SDK_RESULT" \
            "desktop:$DESKTOP_RESULT" \
            "mobile:$MOBILE_RESULT" \
            "containers:$CONTAINERS_RESULT"; do
            name="${item%%:*}"
            result="${item#*:}"
            echo "$name=$result"
            [[ "$result" == success ]] || failed=1
          done
          if [[ "$failed" -ne 0 ]]; then
            echo 'Um ou mais builds obrigatórios falharam. A release permanecerá em draft.' >&2
            exit 1
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
        run: |
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false \
            -f make_latest=true >/dev/null

      - name: Final summary
        shell: bash
        run: |
          {
            echo '## Release publicada'
            echo
            echo '- Tag: `${{ needs.prepare.outputs.tag }}`'
            echo '- Core, runtimes, SDKs, desktop, mobile e containers concluídos.'
            echo '- Os binários foram anexados diretamente à GitHub Release.'
            echo '- As imagens foram publicadas no GHCR.'
          } >> "$GITHUB_STEP_SUMMARY"
