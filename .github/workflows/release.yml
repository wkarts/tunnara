name: Release after merge

on:
  push:
    branches: [main]
    paths:
      - VERSION
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Retomar e substituir assets de uma release ainda em draft'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  NPM_CONFIG_AUDIT: 'false'
  NPM_CONFIG_FUND: 'false'

jobs:
  prepare:
    name: Prepare immutable draft release
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_id: ${{ steps.release.outputs.release_id }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      should_build: ${{ steps.release.outputs.should_build }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve deterministic immutable release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild || false }}
        run: |
          set -Eeuo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || {
            echo "VERSION inválida: $version" >&2
            exit 1
          }
          prerelease=false
          [[ "$version" == *-* ]] && prerelease=true
          notes_file="docs/releases/v${version}.md"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            release_json="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag")"
            is_draft="$(jq -r .draft <<<"$release_json")"
            if [[ "$is_draft" != true ]]; then
              echo "::error::A release publicada $tag é imutável. Incremente VERSION antes do merge; não reabra a release nem mova a tag." >&2
              exit 1
            fi
            git fetch --force --tags origin
            existing_sha="$(git rev-list -n1 "$tag" 2>/dev/null || true)"
            if [[ -n "$existing_sha" && "$existing_sha" != "$GITHUB_SHA" ]]; then
              echo "::error::O draft $tag pertence ao commit $existing_sha, mas o workflow executa $GITHUB_SHA. Use uma nova versão." >&2
              exit 1
            fi
            echo "::notice::Retomando o draft imutável $tag no mesmo commit."
            if [[ "$FORCE_REBUILD" != true && "${{ github.event_name }}" == workflow_dispatch ]]; then
              echo "::notice::Execução manual sem force_rebuild: o draft existente será retomado normalmente."
            fi
          else
            create_args=(--repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "Tunnara Platform $version" --draft --latest=false)
            [[ "$prerelease" == true ]] && create_args+=(--prerelease)
            if [[ -f "$notes_file" ]]; then create_args+=(--notes-file "$notes_file"); else create_args+=(--generate-notes); fi
            gh release create "$tag" "${create_args[@]}"
          fi

          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --jq .id)"
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "release_id=$release_id"
            echo "prerelease=$prerelease"
            echo "should_build=true"
          } >> "$GITHUB_OUTPUT"

      - name: Release summary
        shell: bash
        run: |
          {
            echo '## Release Tunnara'
            echo
            echo '- Versão: `${{ steps.release.outputs.version }}`'
            echo '- Tag imutável: `${{ steps.release.outputs.tag }}`'
            echo '- Release ID: `${{ steps.release.outputs.release_id }}`'
            echo '- Pré-release: `${{ steps.release.outputs.prerelease }}`'
            echo '- A release permanece em draft até todos os builds obrigatórios terminarem.'
          } >> "$GITHUB_STEP_SUMMARY"

  core:
    name: Build and upload core assets
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/console/package-lock.json

      - name: Install root and console dependencies
        run: |
          bash scripts/ci/npm-ci.sh .
          bash scripts/ci/npm-ci.sh apps/console

      - name: Validate repository
        run: |
          npm run repository:check
          npm run version:check
          npm run validate:node
          npm run validate:shell
          npm run validate:php
          npm run validate:storage
          npm run validate:release
          npm run validate:docker
          npm run validate:mobile
          npm run runtime:test

      - name: Build core deliverables
        shell: bash
        run: |
          npm run console:build
          npm run sdk:c:build
          node scripts/release/build-sea.mjs agent dist/tunnara-agent-linux-x64
          node scripts/release/build-sea.mjs server dist/tunnara-server-linux-x64
          TUNNARA_E2E_AGENT_BIN=dist/tunnara-agent-linux-x64 \
          TUNNARA_E2E_SERVER_BIN=dist/tunnara-server-linux-x64 \
            npm run runtime:test
          npm run artifacts:package

      - name: Upload core assets sequentially
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -Eeuo pipefail
          mapfile -d '' files < <(find artifacts -maxdepth 1 -type f -print0 | sort -z)
          ((${#files[@]} > 0)) || { echo 'Nenhum artefato foi gerado.' >&2; exit 1; }
          bash scripts/release/upload-release-assets.sh "$TAG" "${files[@]}"

  runtime:
    name: Runtime executables
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/runtime-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      release_ref: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  sdk:
    name: SDK binaries
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/sdk-build.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      release_ref: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  desktop:
    name: Desktop applications
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/desktop-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      release_ref: ${{ needs.prepare.outputs.tag }}
      release_id: ${{ needs.prepare.outputs.release_id }}
      prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
    secrets: inherit

  mobile:
    name: Mobile applications
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/mobile-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      release_ref: ${{ needs.prepare.outputs.tag }}
      publish_google_play: false
      publish_testflight: false
      ios_export_method: development
    secrets: inherit

  containers:
    name: Container images
    needs: [prepare, core]
    if: needs.prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/docker-publish.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      release_ref: ${{ needs.prepare.outputs.tag }}
    secrets: inherit

  finalize:
    name: Publish completed release
    needs: [prepare, core, runtime, sdk, desktop, mobile, containers]
    if: always() && needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Verify required build results
        shell: bash
        env:
          CORE_RESULT: ${{ needs.core.result }}
          RUNTIME_RESULT: ${{ needs.runtime.result }}
          SDK_RESULT: ${{ needs.sdk.result }}
          DESKTOP_RESULT: ${{ needs.desktop.result }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
          CONTAINERS_RESULT: ${{ needs.containers.result }}
        run: |
          set -Eeuo pipefail
          failed=0
          for item in \
            "core:$CORE_RESULT" \
            "runtime:$RUNTIME_RESULT" \
            "sdk:$SDK_RESULT" \
            "desktop:$DESKTOP_RESULT" \
            "mobile:$MOBILE_RESULT" \
            "containers:$CONTAINERS_RESULT"; do
            name="${item%%:*}"
            result="${item#*:}"
            echo "$name=$result"
            [[ "$result" == success ]] || failed=1
          done
          if [[ "$failed" -ne 0 ]]; then
            echo 'Um ou mais builds obrigatórios falharam. A release permanecerá em draft.' >&2
            exit 1
          fi

      - name: Publish release with correct channel
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          set -Eeuo pipefail
          if [[ "$PRERELEASE" == true ]]; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease --latest=false
          else
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease=false --latest
          fi

      - name: Final summary
        shell: bash
        run: |
          {
            echo '## Release publicada'
            echo
            echo '- Tag: `${{ needs.prepare.outputs.tag }}`'
            echo '- Pré-release: `${{ needs.prepare.outputs.prerelease }}`'
            echo '- Core, runtimes, SDKs, desktop, mobile e containers concluídos.'
            echo '- Assets possuem nomes exclusivos e uploads idempotentes.'
            echo '- Imagens publicadas no GHCR com SBOM/provenance.'
          } >> "$GITHUB_STEP_SUMMARY"
