name: Release after merge

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Versão SemVer já sincronizada na main'
        required: true
        type: string
      release_sha:
        description: 'Commit imutável que receberá a tag e será compilado'
        required: true
        type: string

permissions:
  actions: read
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ inputs.release_version }}
  cancel-in-progress: false

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  NPM_CONFIG_AUDIT: 'false'
  NPM_CONFIG_FUND: 'false'

jobs:
  prepare:
    name: Prepare immutable draft release
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0

      - name: Resolve deterministic release version
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_VERSION: ${{ inputs.release_version }}
          REQUESTED_SHA: ${{ inputs.release_sha }}
        run: |
          set -Eeuo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          actual_sha="$(git rev-parse HEAD)"
          tag="v${version}"

          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || {
            echo "VERSION inválida: $version" >&2
            exit 1
          }
          [[ "$REQUESTED_VERSION" == "$version" ]] || {
            echo "Versão solicitada ($REQUESTED_VERSION) difere do VERSION do commit ($version)." >&2
            exit 1
          }
          [[ "$REQUESTED_SHA" == "$actual_sha" ]] || {
            echo "Commit solicitado ($REQUESTED_SHA) difere do checkout ($actual_sha)." >&2
            exit 1
          }

          notes_file="docs/releases/v${version}.md"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$tag")"
            [[ "$tag_sha" == "$actual_sha" ]] || {
              echo "A tag existente $tag aponta para $tag_sha, não para $actual_sha. Tags publicadas são imutáveis." >&2
              exit 1
            }
          fi

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            release_json="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft,targetCommitish)"
            is_draft="$(jq -r .isDraft <<<"$release_json")"
            existing_target="$(jq -r .targetCommitish <<<"$release_json")"
            if [[ "$is_draft" != 'true' ]]; then
              echo "A release publicada $tag é imutável. Gere uma nova versão em vez de reabri-la." >&2
              exit 1
            fi
            if [[ "$existing_target" != "$actual_sha" ]]; then
              echo "A draft $tag pertence ao commit $existing_target, não ao commit solicitado $actual_sha." >&2
              echo "Gere uma nova versão ou reexecute a draft com o SHA original." >&2
              exit 1
            fi
            echo "::notice::Retomando a release draft $tag do mesmo commit; assets serão substituídos de forma idempotente."
            edit_args=(--repo "$GITHUB_REPOSITORY" --title "Tunnara Platform $version" --draft=true)
            if [[ -f "$notes_file" ]]; then edit_args+=(--notes-file "$notes_file"); fi
            gh release edit "$tag" "${edit_args[@]}"
          else
            create_args=(
              --repo "$GITHUB_REPOSITORY"
              --target "$actual_sha"
              --title "Tunnara Platform $version"
              --draft
            )
            if [[ "$version" == *-* ]]; then create_args+=(--prerelease); fi
            if [[ -f "$notes_file" ]]; then
              create_args+=(--notes-file "$notes_file")
            else
              create_args+=(--generate-notes)
            fi
            gh release create "$tag" "${create_args[@]}"
          fi

          release_id="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)"

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "release_sha=$actual_sha"
            echo "release_id=$release_id"
          } >> "$GITHUB_OUTPUT"

      - name: Release summary
        shell: bash
        run: |
          {
            echo '## Release Tunnara'
            echo
            echo '- Versão: `${{ steps.release.outputs.version }}`'
            echo '- Tag: `${{ steps.release.outputs.tag }}`'
            echo '- Commit: `${{ steps.release.outputs.release_sha }}`'
            echo '- A release publicada nunca será reaberta nem terá a tag movida.'
            echo '- A release permanece em draft até todos os builds obrigatórios terminarem.'
          } >> "$GITHUB_STEP_SUMMARY"

  core:
    name: Build and upload core assets
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/console/package-lock.json

      - name: Install root and console dependencies
        run: |
          bash scripts/ci/npm-ci.sh .
          bash scripts/ci/npm-ci.sh apps/console

      - name: Validate repository
        run: |
          npm run repository:check
          npm run version:check
          npm run version:test
          npm run validate:node
          npm run validate:shell
          npm run validate:php
          npm run validate:storage
          npm run validate:release
          npm run validate:sea
          npm run validate:docker
          npm run validate:mobile
          npm run runtime:test

      - name: Build core deliverables
        shell: bash
        run: |
          npm run console:build
          npm run sdk:c:build
          node scripts/release/build-sea.mjs agent dist/tunnara-agent-linux-x64
          node scripts/release/build-sea.mjs server dist/tunnara-server-linux-x64
          TUNNARA_E2E_AGENT_BIN=dist/tunnara-agent-linux-x64 \
          TUNNARA_E2E_SERVER_BIN=dist/tunnara-server-linux-x64 \
            npm run runtime:test
          npm run artifacts:package

      - name: Upload core assets to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -Eeuo pipefail
          bash scripts/release/upload-release-assets.sh "$TAG" artifacts

  runtime:
    name: Runtime executables
    needs: [prepare, core]
    uses: ./.github/workflows/runtime-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      source_sha: ${{ needs.prepare.outputs.release_sha }}
    secrets: inherit

  sdk:
    name: SDK binaries
    needs: [prepare, core]
    uses: ./.github/workflows/sdk-build.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      source_sha: ${{ needs.prepare.outputs.release_sha }}
    secrets: inherit

  desktop:
    name: Desktop applications
    needs: [prepare, core]
    uses: ./.github/workflows/desktop-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      source_sha: ${{ needs.prepare.outputs.release_sha }}
      release_id: ${{ needs.prepare.outputs.release_id }}
    secrets: inherit

  mobile:
    name: Mobile applications
    needs: [prepare, core]
    uses: ./.github/workflows/mobile-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      source_sha: ${{ needs.prepare.outputs.release_sha }}
      publish_google_play: false
      publish_testflight: false
      ios_export_method: development
    secrets: inherit

  containers:
    name: Container images
    needs: [prepare, core]
    uses: ./.github/workflows/docker-publish.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}
      source_sha: ${{ needs.prepare.outputs.release_sha }}
    secrets: inherit

  finalize:
    name: Publish completed release
    needs: [prepare, core, runtime, sdk, desktop, mobile, containers]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Verify required build results
        shell: bash
        env:
          CORE_RESULT: ${{ needs.core.result }}
          RUNTIME_RESULT: ${{ needs.runtime.result }}
          SDK_RESULT: ${{ needs.sdk.result }}
          DESKTOP_RESULT: ${{ needs.desktop.result }}
          MOBILE_RESULT: ${{ needs.mobile.result }}
          CONTAINERS_RESULT: ${{ needs.containers.result }}
        run: |
          set -Eeuo pipefail
          failed=0
          for item in \
            "core:$CORE_RESULT" \
            "runtime:$RUNTIME_RESULT" \
            "sdk:$SDK_RESULT" \
            "desktop:$DESKTOP_RESULT" \
            "mobile:$MOBILE_RESULT" \
            "containers:$CONTAINERS_RESULT"; do
            name="${item%%:*}"
            result="${item#*:}"
            echo "$name=$result"
            [[ "$result" == success ]] || failed=1
          done
          if [[ "$failed" -ne 0 ]]; then
            echo 'Um ou mais builds obrigatórios falharam. A release permanecerá em draft.' >&2
            exit 1
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false

      - name: Final summary
        shell: bash
        run: |
          {
            echo '## Release publicada'
            echo
            echo '- Tag: `${{ needs.prepare.outputs.tag }}`'
            echo '- Commit: `${{ needs.prepare.outputs.release_sha }}`'
            echo '- Core, runtimes, SDKs, desktop, mobile e containers concluídos.'
            echo '- Os binários foram anexados diretamente à GitHub Release.'
            echo '- As imagens foram publicadas no GHCR.'
          } >> "$GITHUB_STEP_SUMMARY"
