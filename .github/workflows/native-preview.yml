name: Native fast checks

on:
  workflow_dispatch:
  pull_request:
    branches: [main, next]
    paths:
      - 'crates/**'
      - 'services/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'apps/console/src-tauri/**'
      - 'apps/control-api/**'
      - '.github/workflows/native-preview.yml'

permissions:
  contents: read

concurrency:
  group: native-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-format:
    name: Rust format
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  workspace-check:
    name: Rust workspace compile
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-workspace
      - name: Compile all workspace targets
        run: cargo check --workspace --all-targets

  console-rust-check:
    name: Tauri Rust compile
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/console/src-tauri -> target
          shared-key: native-console
      - name: Install Tauri Linux dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Compile Console with every storage feature
        run: cargo check --manifest-path apps/console/src-tauri/Cargo.toml --all-targets --all-features

  laravel-static:
    name: Laravel static validation
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, pdo_mysql, pdo_pgsql, intl, redis
          coverage: none
          tools: composer:v2
      - name: Composer manifest and PHP syntax
        working-directory: apps/control-api
        run: |
          composer validate --strict --no-check-publish
          find app bootstrap config database routes tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l
