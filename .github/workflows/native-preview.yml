name: Native fast checks

on:
  workflow_dispatch:
  pull_request:
    branches: [main, next]
    paths:
      - 'crates/**'
      - 'services/**'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
      - 'apps/console/src-tauri/**'
      - 'apps/control-api/**'
      - '.github/workflows/native-preview.yml'

permissions:
  contents: read

concurrency:
  group: native-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-check:
    name: Rust format and workspace check
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-fast
      - name: Prepare Tauri resources without producing release artifacts
        run: |
          bash scripts/ci/npm-ci.sh apps/console
          npm --prefix apps/console run build:web:tauri
      - name: Validate Rust workspace
        run: |
          cargo fmt --all --check
          cargo check --workspace --all-targets

  laravel-static:
    name: Laravel static validation
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, pdo_mysql, pdo_pgsql, intl, redis
          coverage: none
          tools: composer:v2
      - name: Composer manifest and PHP syntax
        working-directory: apps/control-api
        run: |
          composer validate --strict --no-check-publish
          find app bootstrap config database routes tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l
