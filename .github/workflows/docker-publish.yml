name: Publish container images

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag SemVer usada nas imagens GHCR'
        required: true
        type: string
      source_sha:
        description: 'Commit imutável a ser compilado'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag SemVer usada nas imagens GHCR, por exemplo v1.1.0'
        required: true
        type: string
      source_sha:
        description: 'Commit a ser compilado; vazio usa o commit do workflow'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: containers-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            context: .
            file: runtime/node/Dockerfile.server
          - image: agent
            context: .
            file: runtime/node/Dockerfile.agent
          - image: console
            context: apps/console
            file: apps/console/Dockerfile
          - image: control-api
            context: apps/control-api
            file: apps/control-api/Dockerfile
          - image: quic-bridge
            context: .
            file: deploy/docker/quic/Dockerfile
          - image: caddy-cloudflare
            context: deploy/docker/cloudflare
            file: deploy/docker/cloudflare/Dockerfile
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Normalize owner and version
        id: version
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          set -Eeuo pipefail
          echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          tag="$REQUESTED_TAG"
          version="${tag#v}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || {
            echo "Tag SemVer inválida: $tag" >&2
            exit 1
          }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "minor=${version%.*}" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ env.GHCR_OWNER }}/tunnara-${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ steps.version.outputs.is_prerelease == 'false' }}
            type=raw,value=rc,enable=${{ steps.version.outputs.is_prerelease == 'true' }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_prerelease == 'false' }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ env.GHCR_OWNER }}/tunnara-${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
