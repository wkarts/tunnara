name: Publish container images

on:
  workflow_dispatch:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: containers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            context: .
            file: runtime/node/Dockerfile.server
          - image: agent
            context: .
            file: runtime/node/Dockerfile.agent
          - image: console
            context: apps/console
            file: apps/console/Dockerfile
          - image: quic-bridge
            context: .
            file: deploy/docker/quic/Dockerfile
          - image: caddy-cloudflare
            context: deploy/docker/cloudflare
            file: deploy/docker/cloudflare/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - name: Normaliza owner para GHCR
        shell: bash
        run: echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ env.GHCR_OWNER }}/tunnara-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ env.GHCR_OWNER }}/tunnara-${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
