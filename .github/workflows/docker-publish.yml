name: Publish container images

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag SemVer usada nas imagens GHCR, por exemplo v1.0.1'
        required: false
        type: string
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: containers-${{ github.ref }}-${{ inputs.release_tag || 'tag' }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            context: .
            file: runtime/node/Dockerfile.server
          - image: agent
            context: .
            file: runtime/node/Dockerfile.agent
          - image: console
            context: apps/console
            file: apps/console/Dockerfile
          - image: quic-bridge
            context: .
            file: deploy/docker/quic/Dockerfile
          - image: caddy-cloudflare
            context: deploy/docker/cloudflare
            file: deploy/docker/cloudflare/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - name: Normaliza owner para GHCR
        shell: bash
        run: echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve container version
        id: version
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          tag="${REQUESTED_TAG:-$GITHUB_REF_NAME}"
          version="${tag#v}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]] || { echo "Tag SemVer inválida: $tag" >&2; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "minor=${version%.*}" >> "$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ env.GHCR_OWNER }}/tunnara-${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=latest,enable=${{ !contains(steps.version.outputs.version, '-') }}
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ env.GHCR_OWNER }}/tunnara-${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
