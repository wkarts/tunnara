name: SDK release builds

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release draft que receberá os SDKs'
        required: true
        type: string
      release_ref:
        description: 'Git ref imutável usado no checkout; por padrão usa release_tag'
        required: false
        default: ''
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release existente que receberá os SDKs'
        required: true
        type: string
      release_ref:
        description: 'Git ref imutável usado no checkout; por padrão usa release_tag'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: sdk-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  c-sdk:
    name: c-sdk (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            suffix: linux-x64
          - os: windows-latest
            suffix: windows-x64
          - os: macos-15
            suffix: macos-arm64
          - os: macos-15-intel
            suffix: macos-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_ref || inputs.release_tag }}

      - name: Ensure target release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
        run: gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

      - uses: lukka/get-cmake@latest

      - name: Configure
        shell: bash
        run: cmake -S sdk/c -B sdk/c/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/sdk/c/stage"

      - name: Build and install
        shell: bash
        run: |
          cmake --build sdk/c/build --config Release
          cmake --install sdk/c/build --config Release

      - name: Smoke test Unix
        if: runner.os != 'Windows'
        shell: bash
        run: ./sdk/c/build/version-example

      - name: Smoke test Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./sdk/c/build/Release/version-example.exe

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C sdk/c/stage -czf "dist/Tunnara-SDK-C-${{ matrix.suffix }}-${{ inputs.release_tag }}.tar.gz" .
          (cd dist && shasum -a 256 * > "SHA256SUMS-sdk-c-${{ matrix.suffix }}.txt")

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path sdk/c/stage/* -DestinationPath "dist/Tunnara-SDK-C-${{ matrix.suffix }}-${{ inputs.release_tag }}.zip" -Force
          Get-FileHash dist/*.zip -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLower())  $([IO.Path]::GetFileName($_.Path))"
          } | Set-Content "dist/SHA256SUMS-sdk-c-${{ matrix.suffix }}.txt"

      - name: Attach SDK assets sequentially
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
        run: |
          set -Eeuo pipefail
          files=(dist/*)
          bash scripts/release/upload-release-assets.sh "$TAG" "${files[@]}"
