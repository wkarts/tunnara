name: SDK release builds

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag da GitHub Release que receberá os SDKs'
        required: false
        type: string
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

concurrency:
  group: sdk-release-${{ github.ref }}-${{ inputs.release_tag || 'tag' }}
  cancel-in-progress: false

jobs:
  c-sdk:
    name: c-sdk (${{ matrix.suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            suffix: linux-x64
          - os: windows-latest
            suffix: windows-x64
          - os: macos-14
            suffix: macos-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          tag="${REQUESTED_TAG:-$GITHUB_REF_NAME}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - uses: lukka/get-cmake@latest
      - name: Configure
        run: cmake -S sdk/c -B sdk/c/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/sdk/c/stage"
      - name: Build and install
        run: |
          cmake --build sdk/c/build --config Release
          cmake --install sdk/c/build --config Release
      - name: Smoke test Unix
        if: runner.os != 'Windows'
        run: ./sdk/c/build/version-example
      - name: Smoke test Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./sdk/c/build/Release/version-example.exe
      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C sdk/c/stage -czf "dist/Tunnara-SDK-C-${{ matrix.suffix }}-${{ steps.release.outputs.tag }}.tar.gz" .
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path sdk/c/stage/* -DestinationPath "dist/Tunnara-SDK-C-${{ matrix.suffix }}-${{ steps.release.outputs.tag }}.zip" -Force
      - name: Attach SDK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}
          files: dist/*
          fail_on_unmatched_files: true
