name: ${COMPOSE_PROJECT_NAME:-tunnara-control}

services:
  control-api:
    image: ${TUNNARA_CONTROL_IMAGE:-ghcr.io/wkarts/tunnara-control-api:1.1.1}
    pull_policy: ${TUNNARA_PULL_POLICY:-missing}
    restart: unless-stopped
    environment:
      APP_NAME: Tunnara Control API
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?Execute ./storage.sh init}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_VERSION: 1.1.1
      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUN_MIGRATIONS: "true"
      CACHE_STORE: ${CACHE_STORE:-file}
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      DB_CACHE_CONNECTION: ${DB_CACHE_CONNECTION:-}
      DB_QUEUE_CONNECTION: ${DB_QUEUE_CONNECTION:-}
      SESSION_CONNECTION: ${SESSION_CONNECTION:-}
      REDIS_CLIENT: phpredis
      REDIS_CACHE_CONNECTION: cache
      REDIS_QUEUE_CONNECTION: queue
    volumes:
      - tunnara_control_storage:/app/storage
    ports:
      - "${CONTROL_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks: [tunnara-control]

  console:
    image: ${TUNNARA_CONSOLE_IMAGE:-ghcr.io/wkarts/tunnara-console:1.1.1}
    pull_policy: ${TUNNARA_PULL_POLICY:-missing}
    restart: unless-stopped
    depends_on:
      control-api:
        condition: service_healthy
    ports:
      - "${CONSOLE_PORT:-7400}:80"
    networks: [tunnara-control]

volumes:
  tunnara_control_storage:

networks:
  tunnara-control:
    driver: bridge
