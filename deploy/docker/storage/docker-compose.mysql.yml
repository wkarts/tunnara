services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tunnara}
      MYSQL_USER: ${DB_USERNAME:-tunnara}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Execute ./storage.sh init}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Execute ./storage.sh init}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - tunnara_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks: [tunnara-control]

  control-api:
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-tunnara}
      DB_USERNAME: ${DB_USERNAME:-tunnara}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CHARSET: utf8mb4
      DB_COLLATION: utf8mb4_unicode_ci
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  tunnara_mysql:
