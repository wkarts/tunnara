global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode http
  option httplog
  timeout connect 5s
  timeout client 30s
  timeout server 30s

frontend control
  bind *:7100
  default_backend controls

backend controls
  option httpchk GET /healthz
  http-check expect status 200
  balance roundrobin
  server control-a control-a:7100 check
  server control-b control-b:7100 check
