name: ${COMPOSE_PROJECT_NAME:-tunnara}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tunnara
      POSTGRES_USER: tunnara
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD não configurada}
    volumes:
      - tunnara_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunnara -d tunnara"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [control]

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD não configurada}
    volumes:
      - tunnara_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [control]

  nats:
    image: nats:2.11-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - tunnara_nats:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [control]

  control-api:
    build:
      context: ../../apps/control-api
    restart: unless-stopped
    env_file:
      - ../../apps/control-api/.env
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${CONTROL_API_PORT:-8080}:8080"
    networks: [control, public]

  coordinator:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rust-service
      args:
        SERVICE: tunnara-coordinator
    restart: unless-stopped
    environment:
      TUNNARA_COORDINATOR_BIND: 0.0.0.0:7100
      RUST_LOG: info
    depends_on:
      nats:
        condition: service_healthy
    ports:
      - "${COORDINATOR_PORT:-7100}:7100"
    networks: [control, public]

  edge:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rust-service
      args:
        SERVICE: tunnara-edge
    restart: unless-stopped
    environment:
      TUNNARA_EDGE_BIND: 0.0.0.0:7200
      RUST_LOG: info
    depends_on:
      - coordinator
    ports:
      - "${EDGE_HTTP_PORT:-80}:7200"
      - "${EDGE_HTTPS_PORT:-443}:7200"
    networks: [control, public]

  relay:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.rust-service
      args:
        SERVICE: tunnara-relay
    restart: unless-stopped
    environment:
      TUNNARA_RELAY_BIND: 0.0.0.0:7300
      RUST_LOG: info
    depends_on:
      - coordinator
    ports:
      - "${RELAY_PORT:-7300}:7300/tcp"
      - "${RELAY_PORT:-7300}:7300/udp"
    networks: [control, public]

  console:
    build:
      context: ../../apps/console
      args:
        VITE_TUNNARA_API_URL: /control
    restart: unless-stopped
    depends_on:
      - control-api
    ports:
      - "${CONSOLE_PORT:-7400}:80"
    networks: [public]

volumes:
  tunnara_postgres:
  tunnara_redis:
  tunnara_nats:

networks:
  control:
    internal: true
  public:
