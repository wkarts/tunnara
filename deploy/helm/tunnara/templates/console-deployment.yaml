apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tunnara.fullname" . }}-console
  labels: {{- include "tunnara.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  replicas: {{ .Values.console.replicaCount }}
  selector:
    matchLabels: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: console }
  template:
    metadata:
      labels: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: console }
    spec:
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: console
          image: "{{ .Values.console.image.repository }}:{{ .Values.console.image.tag }}"
          imagePullPolicy: {{ .Values.console.image.pullPolicy }}
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
          ports: [{ name: http, containerPort: 80 }]
          livenessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 5, periodSeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 2, periodSeconds: 5 }
          resources: {{- toYaml .Values.console.resources | nindent 12 }}
          volumeMounts: [{ name: tmp, mountPath: /tmp }, { name: cache, mountPath: /var/cache/nginx }, { name: run, mountPath: /var/run }]
      volumes: [{ name: tmp, emptyDir: {} }, { name: cache, emptyDir: {} }, { name: run, emptyDir: {} }]
