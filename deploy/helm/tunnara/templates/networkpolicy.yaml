{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tunnara.fullname" . }}-default
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/instance: {{ .Release.Name }} }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: {}
    - ports:
        - { protocol: TCP, port: 7100 }
        - { protocol: TCP, port: 7200 }
        - { protocol: TCP, port: 7300 }
        - { protocol: TCP, port: 80 }
  egress:
    - {}
{{- end }}
