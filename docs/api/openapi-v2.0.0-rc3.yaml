openapi: 3.1.0
info:
  title: Tunnara Control API
  version: 2.0.0-rc.3
  description: |
    API administrativa e operacional da Tunnara. Todos os recursos são isolados pela organização
    associada ao token. Tokens devem usar o menor conjunto de escopos necessário.
servers:
  - url: https://control.tunnel.example.com
security:
  - bearerAuth: []
tags:
  - {name: System}
  - {name: Agents}
  - {name: Tunnels}
  - {name: Policies}
  - {name: Inspector}
  - {name: Networks}
  - {name: Infrastructure}
  - {name: Integrations}
  - {name: Security}
paths:
  /healthz:
    get:
      tags: [System]
      security: []
      responses:
        '200': {description: Serviço saudável, content: {application/json: {schema: {$ref: '#/components/schemas/Health'}}}}
  /api/v1/health:
    get:
      tags: [System]
      security: []
      responses: {'200': {description: Saúde do serviço}}
  /metrics:
    get:
      tags: [System]
      description: Métricas Prometheus. Requer `metrics:read`, cluster token ou habilitação interna explícita.
      responses: {'200': {description: OpenMetrics/Prometheus, content: {text/plain: {schema: {type: string}}}}}
  /api/v1/session:
    get:
      tags: [Security]
      responses: {'200': {description: Sessão autenticada}}
  /api/v1/overview:
    get:
      tags: [System]
      responses: {'200': {description: Resumo operacional}}
  /api/v1/agents:
    get:
      tags: [Agents]
      responses: {'200': {description: Agents da organização}}
  /api/v1/agents/register:
    post:
      tags: [Agents]
      security: []
      parameters:
        - {in: header, name: X-Tunnara-Provisioning-Token, required: true, schema: {type: string}}
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/AgentRegistration'}}}
      responses: {'201': {description: Agent registrado}, '401': {$ref: '#/components/responses/Unauthorized'}}
  /api/v1/agents/heartbeat:
    post:
      tags: [Agents]
      responses: {'200': {description: Heartbeat aceito}}
  /api/v1/agents/{id}/revoke:
    post:
      tags: [Agents]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'200': {description: Agent revogado}, '404': {$ref: '#/components/responses/NotFound'}}
  /api/v1/provisioning-tokens:
    post:
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: {type: string, maxLength: 160}
                ttlSeconds: {type: integer, minimum: 60, maximum: 86400, default: 900}
      responses: {'201': {description: Token descartável criado}}
  /api/v1/tunnels:
    get:
      tags: [Tunnels]
      responses: {'200': {description: Túneis da organização}}
    post:
      tags: [Tunnels]
      parameters:
        - in: header
          name: Idempotency-Key
          schema: {type: string, maxLength: 128}
          description: Evita criação duplicada quando a requisição é repetida.
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/TunnelInput'}}}
      responses: {'201': {description: Túnel criado}, '409': {description: Hostname ou porta já reservados}}
  /api/v1/tunnels/{id}:
    get:
      tags: [Tunnels]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'200': {description: Túnel com targets}}
    patch:
      tags: [Tunnels]
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {type: object}}}}
      responses: {'200': {description: Túnel atualizado}}
    delete:
      tags: [Tunnels]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Túnel excluído}}
  /api/v1/tunnels/{id}/targets:
    get:
      tags: [Tunnels]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'200': {description: Targets do túnel}}
    post:
      tags: [Tunnels]
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TunnelTargetInput'}}}}
      responses: {'201': {description: Target criado}}
  /api/v1/tunnel-targets/{id}:
    patch:
      tags: [Tunnels]
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TunnelTargetInput'}}}}
      responses: {'200': {description: Target atualizado}}
    delete:
      tags: [Tunnels]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Target excluído}, '409': {description: O último target não pode ser excluído}}
  /api/v1/policies:
    get:
      tags: [Policies]
      responses: {'200': {description: Traffic Policies}}
    post:
      tags: [Policies]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PolicyInput'}}}}
      responses: {'201': {description: Política criada}}
  /api/v1/policies/{id}:
    get:
      tags: [Policies]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'200': {description: Política}}
    patch:
      tags: [Policies]
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PolicyInput'}}}}
      responses: {'200': {description: Política atualizada}}
    delete:
      tags: [Policies]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Política removida}, '409': {description: Política em uso}}
  /api/v1/inspections:
    get:
      tags: [Inspector]
      parameters:
        - {in: query, name: tunnelId, schema: {type: string, format: uuid}}
        - {in: query, name: limit, schema: {type: integer, minimum: 1, maximum: 500, default: 100}}
        - {in: query, name: offset, schema: {type: integer, minimum: 0, default: 0}}
      responses: {'200': {description: Capturas redigidas}}
    delete:
      tags: [Inspector]
      parameters:
        - {in: query, name: olderThanDays, schema: {type: integer, minimum: 0, default: 0}}
      responses: {'200': {description: Quantidade removida}}
  /api/v1/inspections/{id}:
    get:
      tags: [Inspector]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'200': {description: Detalhes da captura}}
    delete:
      tags: [Inspector]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Captura removida}}
  /api/v1/inspections/{id}/replay:
    post:
      tags: [Inspector]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'200': {description: Resposta da requisição reproduzida}}
  /api/v1/networks:
    get:
      tags: [Networks]
      responses: {'200': {description: Redes privadas}}
    post:
      tags: [Networks]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/NetworkInput'}}}}
      responses: {'201': {description: Rede criada}}
  /api/v1/networks/{id}:
    delete:
      tags: [Networks]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Rede removida}}
  /api/v1/networks/{id}/peers:
    get:
      tags: [Networks]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'200': {description: Peers e configuração da rede}}
    post:
      tags: [Networks]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'201': {description: Peer associado}}
  /api/v1/nodes:
    get:
      tags: [Infrastructure]
      responses: {'200': {description: Edges e Relays registrados}}
  /api/v1/integrations:
    get:
      tags: [Integrations]
      responses: {'200': {description: Integrações configuradas}}
  /api/v1/integrations/cloudflare:
    get:
      tags: [Integrations]
      responses: {'200': {description: Configuração Cloudflare sem expor o token}}
    put:
      tags: [Integrations]
      responses: {'200': {description: Integração salva com segredo criptografado}}
  /api/v1/integrations/cloudflare/test:
    post:
      tags: [Integrations]
      responses: {'200': {description: Token e zona validados}}
  /api/v1/integrations/cloudflare/bootstrap-dns:
    post:
      tags: [Integrations]
      responses: {'200': {description: Registros base e wildcard criados}}
  /api/v1/dns/records:
    get:
      tags: [Integrations]
      responses: {'200': {description: Registros administrados}}
    post:
      tags: [Integrations]
      responses: {'201': {description: Registro criado}}
  /api/v1/dns/records/{id}:
    delete:
      tags: [Integrations]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Registro removido}}
  /api/v1/api-tokens:
    get:
      tags: [Security]
      responses: {'200': {description: Tokens administrativos}}
    post:
      tags: [Security]
      responses: {'201': {description: Token criado e exibido uma única vez}}
  /api/v1/api-tokens/{id}:
    delete:
      tags: [Security]
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses: {'204': {description: Token revogado}, '409': {description: Auto-revogação negada}}
  /api/v1/audit:
    get:
      tags: [Security]
      responses: {'200': {description: Eventos de auditoria}}
components:
  securitySchemes:
    bearerAuth: {type: http, scheme: bearer, bearerFormat: TunnaraToken}
  parameters:
    Id: {in: path, name: id, required: true, schema: {type: string, format: uuid}}
  responses:
    Unauthorized: {description: Token ausente, inválido, expirado ou sem escopo}
    NotFound: {description: Recurso não encontrado na organização autenticada}
  schemas:
    Health:
      type: object
      properties:
        status: {type: string, example: ok}
        service: {type: string}
        version: {type: string}
    AgentRegistration:
      type: object
      required: [name, publicKey]
      properties:
        name: {type: string}
        publicKey: {type: string, description: Chave pública Ed25519}
        platform: {type: string}
        architecture: {type: string}
        version: {type: string}
    TunnelInput:
      type: object
      required: [name, protocol, targets]
      properties:
        name: {type: string}
        protocol: {type: string, enum: [http, https, tcp, udp]}
        hostname: {type: string}
        publicPort: {type: integer, minimum: 1, maximum: 65535}
        autoDns: {type: boolean, default: false}
        transport: {type: string, enum: [auto, tcp, quic], default: auto}
        policyId: {type: [string, 'null'], format: uuid}
        inspectorEnabled: {type: boolean, default: false}
        inspectorBodyLimit: {type: integer, minimum: 0, maximum: 1048576, default: 65536}
        targets:
          type: array
          minItems: 1
          items: {$ref: '#/components/schemas/TunnelTargetInput'}
    TunnelTargetInput:
      type: object
      required: [agentId, targetPort]
      properties:
        agentId: {type: string, format: uuid}
        name: {type: string, default: default}
        targetHost: {type: string, default: 127.0.0.1}
        targetPort: {type: integer, minimum: 1, maximum: 65535}
        weight: {type: integer, minimum: 1, default: 1}
        priority: {type: integer, default: 100}
        enabled: {type: boolean, default: true}
        healthCheck:
          type: object
          properties:
            type: {type: string, enum: [http, https, tcp]}
            path: {type: string, default: /healthz}
            intervalSeconds: {type: integer, minimum: 1, default: 10}
            timeoutSeconds: {type: integer, minimum: 1, default: 3}
            healthyThreshold: {type: integer, minimum: 1, default: 2}
            unhealthyThreshold: {type: integer, minimum: 1, default: 3}
    PolicyInput:
      type: object
      required: [name, document]
      properties:
        name: {type: string}
        description: {type: string}
        enabled: {type: boolean, default: true}
        document:
          type: object
          required: [defaultEffect, rules]
          properties:
            defaultEffect: {type: string, enum: [allow, deny], default: deny}
            rules:
              type: array
              items:
                type: object
                required: [actions]
                properties:
                  name: {type: string}
                  match: {type: object, additionalProperties: true}
                  actions:
                    type: array
                    items: {type: object, required: [type], additionalProperties: true}
    NetworkInput:
      type: object
      required: [name, cidr]
      properties:
        name: {type: string}
        cidr: {type: string, example: 10.91.0.0/24}
        dnsDomain: {type: string}
        mode: {type: string, enum: [mesh, hub-spoke]}
